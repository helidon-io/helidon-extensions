name: "Release"

on:
  push:
    branches: [ '*/release-*' ]

env:
  MVN_VERSION: 3.9.9
  JAVA_VERSION: 26
  JAVA_DISTRO: oracle
  MVN_ARGS: |
    -B -fae -e -ntp
    -Dmaven.wagon.httpconnectionManager.ttlSeconds=60
    -Dmaven.wagon.http.retryHandler.count=3
    -Djdk.toolchain.version=${JAVA_VERSION}
    -Dcache.enabled=true

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-tag:
    runs-on: ubuntu-22.04
    environment: release
    outputs:
      version: ${{ steps.create-tag.outputs.version }}
      tag: ${{ steps.create-tag.outputs.tag }}
      extension: ${{ steps.create-tag.outputs.extension }}
      poms: ${{ steps.create-tag.outputs.poms }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: '0'
          token: ${{ secrets.SERVICE_ACCOUNT_TOKEN }}
      - id: create-tag
        run: ./etc/scripts/release.sh create_tag >> "${GITHUB_OUTPUT}"
  validate:
    needs: create-tag
    uses: ./.github/workflows/validate.yaml
    with:
      ref: ${{ needs.create-tag.outputs.tag }}
  stage:
    needs: [ create-tag, validate ]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: release
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.create-tag.outputs.tag }}
      - shell: bash
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: ./etc/scripts/setup-gpg.sh
      - uses: ./.github/actions/common
        with:
          build-cache: read-only
          artifact-name: io-helidon-extensions-${{ needs.create-tag.outputs.extension }}-artifacts
          artifact-path: staging
          run: |
            # stage changed poms
            IFS=',' read -r -a poms <<< "${{ needs.create-tag.outputs.poms }}"
            for pom in "${poms[@]}"; do
              mvn ${MVN_ARGS} \
                -f "${pom}" \
                -N \
                -Prelease,no-snapshots \
                -DskipTests \
                -DaltDeploymentRepository=":::file://${PWD}/staging" \
                deploy
            done

            # stage extension
            mvn ${MVN_ARGS} \
              -f "extensions/${{ needs.create-tag.outputs.extension }}/pom.xml" \
              -Prelease,no-snapshots \
              -DskipTests \
              -DaltDeploymentRepository=":::file://${PWD}/staging" \
              deploy
  deploy:
    needs: [ create-tag, stage ]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: release
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: '0'
          ref: ${{ needs.create-tag.outputs.tag }}
      - uses: actions/download-artifact@v4
        with:
          name: io-helidon-extensions-${{ needs.create-tag.outputs.extension }}-artifacts
          path: staging
      - shell: bash
        env:
          CENTRAL_USER: ${{ secrets.CENTRAL_USER }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
        run: |
          etc/scripts/upload.sh upload_release \
            --dir="staging" \
            --description="Helidon Extensions ${{ needs.create-tag.outputs.extension }} v%{version}"
