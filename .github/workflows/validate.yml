name: "Validate"

on:
  pull_request:
  push:
    branches-ignore: [ 'main', 'release-*' ]
    tags-ignore: [ '**' ]
  workflow_call:
    inputs:
      ref:
        description: The branch, tag or SHA to checkout
        required: false
        type: string
        default: ''

env:
  MVN_VERSION: 3.9.9
  JAVA_VERSION: 21
  JAVA_DISTRO: oracle
  MVN_ARGS: |
    -B -fae -e
    -Dmaven.wagon.httpconnectionManager.ttlSeconds=60
    -Dmaven.wagon.http.retryHandler.count=3
    -Djdk.toolchain.version=${JAVA_VERSION}
    -Dcache.enabled=true

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prime-build:
    timeout-minutes: 30
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '0'
      - name: Helidon Priming build
        uses: ./.github/actions/common
        with:
          free-space: true
          build-cache: read-write
          maven-cache: read-write
          run: |
            etc/scripts/prime-build.sh
  copyright:
    needs: prime-build
    timeout-minutes: 5
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - uses: ./.github/actions/common
        with:
          run: etc/scripts/copyright.sh
  checkstyle:
    needs: prime-build
    timeout-minutes: 5
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/common
        with:
          run: etc/scripts/checkstyle.sh
  shellcheck:
    timeout-minutes: 5
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/common
        with:
          maven-cache: none
          run: etc/scripts/shellcheck.sh
  build:
    needs: prime-build
    timeout-minutes: 15
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/common
        with:
          build-cache: read-write
          maven-cache: read-write
          run: |
            mvn --version
            mvn ${MVN_ARGS} io.helidon.build-tools:helidon-build-cache-maven-plugin:4.0.26:go-offline
            mvn ${MVN_ARGS} \
              -Dorg.slf4j.simpleLogger.showThreadName=true \
              -DskipTests \
              install
  _tests:
    needs: build
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ ubuntu-22.04, windows-2022 ]
        moduleSet: [ helidon, oci, vault, neo4j ]
        include:
          - { os: ubuntu-22.04, platform: linux }
          - { os: windows-2022, platform: windows }
    runs-on: ${{ matrix.os }}
    name: tests/${{ matrix.moduleSet }}-${{matrix.platform}}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/common
        with:
          build-cache: read-only
          test-artifact-name: tests-${{ matrix.moduleSet }}-${{ matrix.platform }}
          free-space: true
          run: |
            mvn ${MVN_ARGS} \
              -DreactorRule=tests \
              -DmoduleSet=${{ matrix.moduleSet }} \
              -Dsurefire.reportNameSuffix=${{ matrix.platform }} \
              verify
  _examples:
    needs: build
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ ubuntu-22.04, windows-2022 ]
        moduleSet: [ helidon, oci, vault, neo4j ]
        include:
          - { os: ubuntu-22.04, platform: linux }
          - { os: windows-2022, platform: windows }
    runs-on: ${{ matrix.os }}
    name: examples/${{ matrix.moduleSet }}-${{matrix.platform}}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/common
        with:
          build-cache: read-only
          test-artifact-name: examples-${{ matrix.moduleSet }}-${{ matrix.platform }}
          free-space: true
          run: |
            mvn ${MVN_ARGS} \
              -DreactorRule=examples \
              -DmoduleSet=${{ matrix.moduleSet }} \
              -Dsurefire.reportNameSuffix=${{ matrix.platform }} \
              verify
  gate:
    runs-on: ubuntu-22.04
    needs: [ copyright, checkstyle, shellcheck, build, _tests, _examples ]
    steps:
      - shell: bash
        run: |
          echo OK
