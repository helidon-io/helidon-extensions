declarative:
  ignore-incubating: true

server:
  port: 8090
  features:
    static-content:
      classpath:
        - context: /chess
          location: agentic-chess-ui
          welcome: index.html

langchain4j:
  agents:
    chess-commentary:
      streaming-chat-model: agentic-chess-streaming-model
    chess-opponent:
      chat-model: agentic-chess-chat-model
      output-guardrails:
        - io.helidon.extensions.langchain4j.examples.agentic.chess.ai.IllegalMoveOutputGuardrail
      output-guardrails-config:
        max-retries: 6

  models:
    agentic-chess-chat-model:
      provider: open-ai
    agentic-chess-streaming-model:
      provider: open-ai

  providers:
    open-ai:
      api-key: ${OCI_API_KEY}
      base-url: https://inference.generativeai.us-chicago-1.oci.oraclecloud.com/20231130/actions
      model-name: openai.gpt-oss-120b
      timeout: PT90S
      max-retries: 5

agentic-chess:
  candidate-lines:
    count: 3
    plies: 3
  sessions:
    idle-timeout: PT30M
    cleanup-interval: PT1M
