server:
  features:
    static-content:
      classpath:
        - context: /chess
          location: agentic-chess-ui
          welcome: index.html

langchain4j:
  agents:
    chess-opponent:
      chat-model: agentic-chess-mock-chat-model
      output-guardrails:
        - io.helidon.extensions.langchain4j.examples.agentic.chess.ai.IllegalMoveOutputGuardrail
      output-guardrails-config:
        max-retries: 6

  services:
    chess-commentary:
      streaming-chat-model: agentic-chess-mock-streaming-model

  models:
    agentic-chess-mock-chat-model:
      provider: helidon-mock
    agentic-chess-mock-streaming-model:
      provider: helidon-mock

  providers:
    open-ai:
      api-key: test-key
      base-url: http://127.0.0.1:1
