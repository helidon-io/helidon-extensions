openapi: 3.0.3
info:
  title: Array Enum Property Repro
  version: 1.0.0
paths:
  /sample:
    get:
      operationId: getSample
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SampleModel'
components:
  schemas:
    SampleModel:
      type: object
      required:
        - values
      properties:
        values:
          description: Sample enum values.
          type: array
          minItems: 1
          items:
            type: string
            enum:
              - FIRST
              - SECOND
              - THIRD
