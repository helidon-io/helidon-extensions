openapi: 3.0.3
info:
  title: discriminator-compound-word
  version: 1.0.0
paths: {}
components:
  schemas:
    ApplicableScope:
      type: object
      required:
        - scopeType
      properties:
        scopeType:
          type: string
          enum:
            - PROJECT_SCOPE
            - SERVICE_PHONEBOOK_SCOPE
      discriminator:
        propertyName: scopeType
      oneOf:
        - $ref: '#/components/schemas/ProjectScope'
        - $ref: '#/components/schemas/ServicePhoneBookScope'

    ProjectScope:
      allOf:
        - $ref: '#/components/schemas/ApplicableScope'
        - type: object
          properties:
            projectId:
              type: string
          x-discriminator-value: PROJECT_SCOPE

    ServicePhoneBookScope:
      allOf:
        - $ref: '#/components/schemas/ApplicableScope'
        - type: object
          discriminator: SERVICE_PHONEBOOK_SCOPE
          properties:
            dummy:
              type: string
