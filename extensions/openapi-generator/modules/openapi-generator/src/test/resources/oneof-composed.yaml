openapi: 3.0.3
info:
  title: oneOf composed schema check
  version: 1.0.0
servers:
  - url: http://localhost:8080/api
paths:
  /pets/union:
    get:
      operationId: getPetUnion
      tags:
        - pets
      responses:
        '200':
          description: oneOf response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetUnion'
components:
  schemas:
    Cat:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        lives:
          type: integer
    Dog:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        breed:
          type: string
    PetUnion:
      oneOf:
        - $ref: '#/components/schemas/Cat'
        - $ref: '#/components/schemas/Dog'
